version: '3.8'

services:
  telegram-bot:
    build:
      context: ./tg_bot
      dockerfile: Dockerfile
    container_name: telegram-bot
    restart: always
    environment:
      - TOKEN=${TOKEN}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${PG_DATABASE}
      - DB_USER=${PG_USER}
      - DB_PASSWORD=${PG_PASSWORD}
      - ADMINS=${ADMINS}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql  # монтируем init.sql для применения миграций
      - ./apply_migrations.sh:/apply_migrations.sh      # монтируем скрипт запуска миграций
    command: ["bash", "/apply_migrations.sh"]

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: always
    environment:
      - POSTGRES_DB=${PG_DATABASE}
      - POSTGRES_USER=${PG_USER}
      - POSTGRES_PASSWORD=${PG_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
